name: upper-build

on:
  push:
    paths:
      - ".github/workflows/upper-build.yml"
      - "upper/**"
  workflow_dispatch: # manual


jobs:  
    build:
        runs-on: ubuntu-latest
        steps:
        - run: pwd && ls -la
        - uses: actions/checkout@v4
        - run: pwd && ls -la
        - run: go version
        - uses: actions/setup-go@v5
          with:
            #go-version: '1.25'
            go-version-file: ./upper/go.mod
            cached-dependency-path: ./upper/go.sum
        - run: go mod download
          working-directory: upper
        - run: go version
        - run: |
            ls
            go build
            go test
          working-directory:  upper
          name: Build and Test 
  
